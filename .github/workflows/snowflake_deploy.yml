name: Snowflake SQL Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-snowflake-sql:
    runs-on: ubuntu-latest

    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Snowflake connector
        run: |
          python -m pip install --upgrade pip
          pip install snowflake-connector-python

      - name: Deploy Snowflake SQL models
        id: deploy_models
        run: python scripts/deploy_snowflake_sql.py

      - name: Run Snowflake warehouse validation tests
        id: validate_models
        run: python scripts/validate_snowflake_models.py

      - name: Upload Snowflake validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snowflake-validation-report-${{ github.run_id }}
          path: |
            artifacts/snowflake_validation_report.json
            artifacts/snowflake_validation_report.md
          if-no-files-found: warn
